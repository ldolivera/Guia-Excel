<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/cadastro"
    method="post"
    novalidate
    autocomplete="on"
    enctype="multipart/form-data">
    <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome"> Nome Completo <span>*</span></label>
        <input type="text" id="nome" name="nome" required> 
        <br> <br>
        <label for="email">Email <span>*</span></label>
        <input type="email" id="email" name="email" required>
        <br> <br>
        <label for="CPF">CPF <span>*</span></label>
        <input type="text" id="CPF" name="CPF"  aria-describedby="cpf-dica" pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}" inputmode="numeric">
        <small id="cpf-dica">
            Formato: 000.000.000-00
        </small>
        <br> <br>
        <label for="data_nascimento">Data de Nascimento <span>*</span></label>
        <input type="date" id="data_nascimento" name="data_nascimento" required>
        <br> <br>
        <label for="Curso">Curso <span>*</span></label>
        <select name="Curso" id="Curso">
            <option value="Engenharia de Software"> Engenharia de Software</option>
            <option value="Ciencia de Dados"> Ciencia de Dados</option>
            <option value="Engenharia da Computação"> Engenharia da Computação</option>
        </select>
    </fieldset>
    <fieldset>
        <legend>Turno</legend>
        <label for="turno_manhã">
            <input type="radio" name="turno_manhã" id="turno_manhã">
            Manhã
        </label>
        <label for="turno_tarde">
            <input type="radio" name="turno_tarde" id="turno_tarde">
            Tarde
        </label>
        <label for="turno_noite">
            <input type="radio" name="turno_noite" id="turno_noite">
            Noite
        </label>
    </fieldset>
    <input type="checkbox" name="Termos" id="Termos"> Aceitar Termos
    <br> <br>
    <button type="submit"> Cadastrar</button>
</form>
</body>
</html>
